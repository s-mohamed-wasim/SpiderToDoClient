<nav class="navbar navbar-light bg-cust shadow-sm py-3">
  <div class="container d-flex justify-content-between align-items-center">

    <!-- Left Section -->
    <div class="d-flex align-items-center mx-1" style="cursor: pointer;" routerLink="/tasks">
      <img src="images/spider_todo_logo_white.png" alt="Spider Logo" class="logo me-2">
      <span class="navbar-brand mb-0 text-light h4">Spider To Do</span>
    </div>

    <!-- Right Section: Profile Avatar -->
    <div class="d-flex align-items-center">
      <p class="nav-greet-user">
        Hi, <span>{{accountService.currentUser()?.fullName}}</span>
      </p>
      <button mat-icon-button [matMenuTriggerFor]="userMenu" class="p-0 border-0 bg-transparent">
        <img
          [src]="accountService.currentUser()?.photoUrl ? accountService.currentUser()?.photoUrl : 'images/user_avatar.png'"
          alt="User Profile" class="profile-avatar">
      </button>

      <mat-menu #userMenu="matMenu">
        <button mat-menu-item routerLink="/user-profile">
          <mat-icon>person</mat-icon>
          <span>Profile</span>
        </button>

        <!-- Nested Settings Menu for Themes -->
        <button mat-menu-item [matMenuTriggerFor]="themesMenu">
          <mat-icon>settings</mat-icon>
          <span>Settings</span>
        </button>

        @if(accountService.currentUser()?.role == 'Admin')
        {
        <button mat-menu-item routerLink="/application-users">
          <mat-icon>people</mat-icon>
          <span>App Users</span>
        </button>
        }
        <button mat-menu-item (click)="logout()">
          <mat-icon>logout</mat-icon>
          <span>Logout</span>
        </button>
      </mat-menu>

      <!-- Sub-menu Definition -->
      <mat-menu #themesMenu="matMenu">
        <div class="px-3 py-2 text-muted fw-bold" style="font-size: 0.85rem">THEMES</div>
        @for (theme of availableThemes; track theme.name) {
        <button mat-menu-item (click)="changeTheme(theme.color)">
          <mat-icon [style.color]="theme.color">circle</mat-icon>
          <span>{{theme.name}}</span>
        </button>
        }
      </mat-menu>
    </div>

  </div>
</nav>
